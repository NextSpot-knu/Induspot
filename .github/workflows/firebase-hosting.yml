name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Next.js Static Site
        # 배포 실패 원인: layout.tsx 의 next/font/google(Geist·Geist_Mono·Noto_Sans_KR)이 빌드 시
        # 구글 폰트를 네트워크로 받는데 러너에서 그 fetch 가 간헐 실패 → 컴파일이 빠르게(약 11초) 깨짐
        # (로컬은 캐시/정상 네트워크라 통과). 번들러 무관이라 최대 3회 재시도로 흡수한다.
        run: |
          for i in 1 2 3; do
            echo "===== web build attempt $i ====="
            if npm run web:build; then exit 0; fi
            echo "attempt $i failed — clean .next, backoff, retry"
            rm -rf apps/web/.next
            sleep 8
          done
          echo "web build failed after 3 attempts"
          exit 1
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_API_GATEWAY_URL: "https://induspot-gateway-9t4vof78.uc.gateway.dev"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # 정적 export 빌드에 Kakao 지도 JS 키가 주입되지 않아 배포 사이트에서 지도가 안 뜨던 문제 해결.
          # 아래 Secret 들을 리포지토리에 등록해야 한다(Settings > Secrets and variables > Actions):
          #   gh secret set NEXT_PUBLIC_KAKAO_MAPS_APP_KEY --body "<카카오 JS 앱 키>"
          #   gh secret set NEXT_PUBLIC_KAKAO_REST_API_KEY --body "<카카오 REST 키>"   (길안내용, 선택)
          NEXT_PUBLIC_KAKAO_MAPS_APP_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAPS_APP_KEY }}
          NEXT_PUBLIC_KAKAO_REST_API_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_REST_API_KEY }}
          # 음성 비서 고품질 TTS(Google Cloud Text-to-Speech). 미설정 시 브라우저 TTS 폴백.
          #   gh secret set NEXT_PUBLIC_GOOGLE_TTS_API_KEY --body "<Cloud TTS API 키(API+리퍼러 제한)>"
          NEXT_PUBLIC_GOOGLE_TTS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_TTS_API_KEY }}
          NEXT_PUBLIC_GOOGLE_TTS_VOICE: ${{ secrets.NEXT_PUBLIC_GOOGLE_TTS_VOICE }}

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@v2.2.0
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
